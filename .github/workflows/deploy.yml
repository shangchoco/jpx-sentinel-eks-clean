name: Deploy to ECS

on:
  push:
    branches:
      - main  # main 브랜치에 코드가 올라갈 때 실행됩니다.

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. AWS 인증 (GitHub Secrets에 저장한 키를 사용합니다)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1  # 본인이 사용하는 리전(도쿄는 ap-northeast-1)

      # 2. ECR 로그인
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: 'true'

      # 3. Java 프로젝트 빌드 (이미지 빌드 전 필수 단계: jar 파일 생성)
      - name: Build Java with Gradle
        working-directory: backend
        run: |
          chmod +x gradlew
          ./gradlew build

      # 4-1. 첫 번째 도커 이미지 빌드 및 푸시 (jpx-java)
      # 프로젝트 루트(.)를 컨텍스트로 잡고 backend/Dockerfile을 사용합니다.
      - name: Build, tag, and push first image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: jpx-java # 첫 번째 리포지토리 이름
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f backend/Dockerfile .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      # 4-2. 두 번째 도커 이미지 빌드 및 푸시 (jpx-python)
      # 프로젝트 루트(.)의 Dockerfile을 사용하여 빌드합니다.
      - name: Build, tag, and push second image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: jpx-python # 두 번째 리포지토리 이름
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      # 5. ECS 서비스 업데이트 (새 이미지로 교체)
      # 두 리포지토리 중 하나라도 새 이미지가 반영되어야 하므로 서비스 강제 재배포를 수행