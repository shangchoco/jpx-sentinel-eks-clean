# -------------------------------------------------------------------------
# Java Backend Service
# -------------------------------------------------------------------------
# [Migration Summary]
# ECS: ALB Target Group -> ECS Task 직접 연결
# EKS: Kubernetes Service (ClusterIP) -> Pod 로드밸런싱
#
# Kubernetes의 Service는 Pod의 IP가 동적으로 변경되더라도
# 고정된 진입점(ClusterIP)을 제공하여 애플리케이션 간 통신을 보장합니다.
# -------------------------------------------------------------------------

apiVersion: v1
kind: Service

metadata:
  # 클러스터 내에서 호출할 서비스 이름 (DNS 도메인으로 사용됨)
  name: jpx-java-backend
  labels:
    app: jpx-java-backend

spec:
  # [Service Discovery]
  # 이 서비스가 트래픽을 전달할 대상 Pod를 선택합니다.
  # backend-deployment.yaml의 label과 일치해야 합니다.
  selector:
    app: jpx-java-backend

  # [Port Mapping]
  ports:
    - name: http
      # 서비스가 클러스터 내부에서 리스닝할 포트
      port: 8080
      # Deployment 내 컨테이너의 포트
      targetPort: 8080
      protocol: TCP

  # [Service Type]
  # ClusterIP: 클러스터 내부 통신용 (기본값)
  # 외부(ALB)와의 연결은 Ingress 리소스에서 이 서비스를 가리키게 됩니다.
  type: ClusterIP